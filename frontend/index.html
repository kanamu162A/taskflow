<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Professional Task Management</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">✅</div>
                <span>TaskFlow</span>
            </div>
            
            <nav class="nav">
                <button class="nav-item active" data-view="all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M3 12h18M3 18h18"/>
                    </svg>
                    All Tasks
                </button>
                <button class="nav-item" data-view="pending">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Pending
                </button>
                <button class="nav-item" data-view="in-progress">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    In Progress
                </button>
                <button class="nav-item" data-view="completed">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Completed
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="stats-card">
                    <div class="stat">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="total-count">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value" id="pending-count">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Done</span>
                        <span class="stat-value" id="completed-count">0</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Header -->
            <header class="main-header">
                <div>
                    <h1 id="view-title">All Tasks</h1>
                    <p id="view-subtitle">Manage your workflow efficiently</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="search-input" placeholder="Search tasks...">
                    </div>
                </div>
            </header>

            <!-- Tasks Container -->
            <div class="tasks-container" id="tasks-container">
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <h3>No tasks yet</h3>
                    <p>Click the + button to create your first task</p>
                </div>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button class="fab" id="fab-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>

        <!-- Modal Overlay -->
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>Create New Task</h2>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                
                <form id="task-form">
                    <div class="form-group">
                        <label>Task Title *</label>
                        <input type="text" id="task-title" placeholder="Enter task title..." autocomplete="off">
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="task-desc" rows="3" placeholder="Add details about this task..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="task-priority">
                                <option value="low">🟢 Low</option>
                                <option value="medium" selected>🟡 Medium</option>
                                <option value="high">🔴 High</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" id="task-due">
                        </div>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" id="cancel-btn">Cancel</button>
                        <button type="submit" class="btn-submit">Create Task</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Modal -->
        <div class="modal-overlay" id="edit-modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>Edit Task</h2>
                    <button class="modal-close" id="edit-modal-close">&times;</button>
                </div>
                
                <form id="edit-form">
                    <div class="form-group">
                        <label>Task Title</label>
                        <input type="text" id="edit-title" placeholder="Enter task title...">
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="edit-desc" rows="3" placeholder="Add details..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="edit-status">
                                <option value="pending">⏳ Pending</option>
                                <option value="in-progress">🔄 In Progress</option>
                                <option value="completed">✅ Completed</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="edit-priority">
                                <option value="low">🟢 Low</option>
                                <option value="medium">🟡 Medium</option>
                                <option value="high">🔴 High</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="edit-due">
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-danger" id="delete-task-btn">Delete</button>
                        <div>
                            <button type="button" class="btn-cancel" id="edit-cancel-btn">Cancel</button>
                            <button type="submit" class="btn-submit">Save Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
